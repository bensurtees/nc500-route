<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<script>
(async function(){
  var KEY='nc500-auth';
  var HASH='6a0d119679a3276c37d145fb81090c829c025226aa90696bc0eec44b5d338044';
  if(localStorage.getItem(KEY)==='1') return;
  document.documentElement.style.visibility='hidden';
  var p=prompt('NC500 · Surtees — Password');
  if(!p){document.documentElement.remove();return;}
  var buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(p));
  var hash=Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
  if(hash!==HASH){document.documentElement.remove();return;}
  localStorage.setItem(KEY,'1');
  document.documentElement.style.visibility='';
})();
</script>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NC500">
<meta name="theme-color" content="#1a1612">
<title>NC500 · Surtees</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,300..900,0..100,0..1&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' fill='%23f4ede0'/><text x='50%25' y='44%25' text-anchor='middle' font-family='serif' font-style='italic' font-weight='600' font-size='52' fill='%231a1612'>NC</text><text x='50%25' y='78%25' text-anchor='middle' font-family='serif' font-weight='800' font-size='62' fill='%23c8501e'>500</text></svg>">

<style>
  :root {
    --paper: #f4ede0;
    --paper-2: #ebe2d2;
    --paper-edge: #d8cdb8;
    --ink: #1a1612;
    --ink-2: #3a322a;
    --ink-3: #6b5d4f;
    --rule: #c4b59c;
    --rule-2: #a89878;
    --accent: #c8501e;
    --accent-deep: #9a3a12;
    --accent-soft: #e6c5a8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', -apple-system, sans-serif;
    font-weight: 400;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: none;
  }

  body {
    min-height: 100vh;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    background-image:
      radial-gradient(ellipse at top left, rgba(200,80,30,0.04) 0%, transparent 50%),
      radial-gradient(ellipse at bottom right, rgba(26,22,18,0.03) 0%, transparent 60%);
  }

  /* Subtle paper grain */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent 0px, transparent 2px, rgba(26,22,18,0.012) 2px, rgba(26,22,18,0.012) 3px),
      repeating-linear-gradient(90deg, transparent 0px, transparent 2px, rgba(26,22,18,0.008) 2px, rgba(26,22,18,0.008) 3px);
    pointer-events: none;
    z-index: 1;
  }

  /* ──────────────────────────────────────────────────────── */
  /* HEADER                                                    */
  /* ──────────────────────────────────────────────────────── */
  .masthead {
    position: relative;
    z-index: 5;
    padding: 32px 24px 20px;
    border-bottom: 1px solid var(--rule);
    background: var(--paper);
  }
  .masthead-row1 {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 14px;
  }
  .masthead-row1 .roadbook { color: var(--accent); font-weight: 700; }

  .masthead-title {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 56px;
    line-height: 0.9;
    letter-spacing: -0.03em;
    color: var(--ink);
    font-variation-settings: "SOFT" 50, "WONK" 1;
  }
  .masthead-title em {
    color: var(--accent);
    font-style: italic;
    font-weight: 600;
  }
  .masthead-sub {
    margin-top: 10px;
    font-family: 'Fraunces', serif;
    font-size: 14px;
    font-style: italic;
    color: var(--ink-3);
    font-weight: 400;
  }

  .masthead-stats {
    display: flex;
    gap: 0;
    margin-top: 18px;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
  }
  .masthead-stats .stat {
    flex: 1;
    padding: 10px 4px;
    text-align: center;
    border-right: 1px dotted var(--rule);
    font-family: 'JetBrains Mono', monospace;
  }
  .masthead-stats .stat:last-child { border-right: 0; }
  .masthead-stats .stat .v {
    font-size: 18px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.02em;
  }
  .masthead-stats .stat .l {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-3);
    margin-top: 2px;
  }

  /* ──────────────────────────────────────────────────────── */
  /* DAY TABS                                                  */
  /* ──────────────────────────────────────────────────────── */
  .tabs {
    position: sticky;
    top: 0;
    z-index: 20;
    background: var(--paper);
    border-bottom: 1px solid var(--rule);
    padding: 0;
    overflow-x: auto;
    display: flex;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    flex: 0 0 auto;
    padding: 14px 16px 12px;
    border: 0;
    background: transparent;
    cursor: pointer;
    text-align: center;
    border-right: 1px dotted var(--rule);
    font-family: 'JetBrains Mono', monospace;
    color: var(--ink-3);
    transition: color 0.15s ease;
    position: relative;
  }
  .tab:last-child { border-right: 0; }
  .tab .num {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    display: block;
  }
  .tab .date {
    font-family: 'Fraunces', serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--ink);
    margin-top: 1px;
    letter-spacing: -0.01em;
  }
  .tab.active { color: var(--accent); }
  .tab.active .date { color: var(--accent); }
  .tab.active::after {
    content: "";
    position: absolute;
    left: 12px; right: 12px; bottom: -1px;
    height: 2px;
    background: var(--accent);
  }
  .tab.today .num::before {
    content: "● ";
    color: var(--accent);
  }

  /* ──────────────────────────────────────────────────────── */
  /* CONTENT                                                   */
  /* ──────────────────────────────────────────────────────── */
  .content {
    position: relative;
    z-index: 5;
    padding: 0 24px 120px;
  }

  .day-panel {
    display: none;
    padding-top: 20px;
    animation: fadein 0.3s ease;
  }
  .day-panel.active { display: block; }
  @keyframes fadein { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  /* Day header */
  .day-folio {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 6px;
  }
  .day-title {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 32px;
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: var(--ink);
    font-variation-settings: "SOFT" 50;
  }
  .day-title em {
    font-style: italic;
    font-weight: 500;
  }
  .day-arrow {
    color: var(--accent);
    font-style: normal;
    margin: 0 6px;
    font-weight: 300;
  }
  .day-meta {
    margin-top: 12px;
    padding: 10px 12px;
    background: var(--paper-2);
    border-left: 3px solid var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    line-height: 1.6;
    color: var(--ink-2);
  }
  .day-meta b { color: var(--ink); font-weight: 700; }

  /* Primary route button */
  .route-go {
    display: block;
    margin: 18px 0 24px;
    padding: 18px 20px;
    background: var(--ink);
    color: var(--paper);
    text-decoration: none;
    border: none;
    width: 100%;
    text-align: left;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: transform 0.15s ease, background 0.15s ease;
    position: relative;
    overflow: hidden;
  }
  .route-go::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 80% 50%, rgba(200,80,30,0.25) 0%, transparent 60%);
    opacity: 0.7;
  }
  .route-go:active { transform: scale(0.99); }
  .route-go .label {
    position: relative;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--accent-soft);
    font-weight: 600;
  }
  .route-go .text {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 6px;
  }
  .route-go .heading {
    font-family: 'Fraunces', serif;
    font-size: 19px;
    font-weight: 500;
    letter-spacing: -0.01em;
  }
  .route-go .arrow {
    font-family: 'Fraunces', serif;
    font-size: 28px;
    font-weight: 300;
    line-height: 0.8;
    color: var(--accent);
  }

  /* Alt route button — secondary, paper-toned */
  .route-alt {
    display: block;
    margin: 0 0 12px;
    padding: 14px 16px;
    background: var(--paper);
    color: var(--ink);
    text-decoration: none;
    border: 1px solid var(--accent);
    position: relative;
    transition: background 0.15s ease;
  }
  .route-alt:active { background: var(--accent-soft); }
  .route-alt .alt-label {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--accent);
    font-weight: 700;
  }
  .route-alt .alt-sub {
    display: block;
    margin-top: 4px;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--ink-2);
    font-weight: 400;
    padding-right: 30px;
  }
  .route-alt .alt-arrow {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 300;
    color: var(--accent);
  }

  /* Apple Maps route button — beneath the main Google Maps one */
  .route-apple {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: -18px 0 24px;
    padding: 10px 14px;
    background: transparent;
    color: var(--ink-2);
    text-decoration: none;
    border: 1px solid var(--rule);
    border-top: 0;
    transition: background 0.15s ease;
  }
  .route-apple:active { background: var(--paper-2); }
  .route-apple .apple-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 600;
  }
  .route-apple .apple-label em {
    font-style: italic;
    font-family: 'Fraunces', serif;
    text-transform: none;
    letter-spacing: 0;
    font-size: 11px;
    color: var(--accent);
    font-weight: 500;
  }
  .route-apple .apple-arrow {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    color: var(--ink-3);
    font-weight: 300;
  }

  /* Apple Maps version of an alt route — small underline link */
  .route-alt-apple {
    display: block;
    margin: -8px 0 12px 4px;
    padding: 4px 0;
    color: var(--ink-3);
    text-decoration: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 500;
    border-bottom: 1px dotted var(--rule);
    width: max-content;
  }
  .route-alt-apple:active { color: var(--accent); }

  /* Stops list */
  .stops-h {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--ink-3);
    font-weight: 700;
    margin: 28px 0 0;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--rule);
    display: flex;
    justify-content: space-between;
  }
  .stops-h .count { color: var(--accent); }

  .stop {
    display: grid;
    grid-template-columns: 30px 1fr 48px;
    gap: 10px;
    padding: 16px 0;
    border-bottom: 1px dotted var(--rule);
    align-items: start;
  }

  .stop-no {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-3);
    text-align: center;
    padding-top: 2px;
    font-weight: 500;
    letter-spacing: -0.02em;
  }
  .stop.is-hotel .stop-no,
  .stop.is-fuel .stop-no { color: var(--accent); }
  .stop-letter {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--accent);
    color: var(--paper);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 700;
    line-height: 1;
    letter-spacing: 0;
  }
  .stop.is-hotel .stop-letter,
  .stop.is-fuel .stop-letter {
    background: var(--ink);
    color: var(--accent);
  }
  .stop-num-only {
    color: var(--ink-3);
    font-weight: 500;
  }

  .stop-body { min-width: 0; }

  .stop-kicker {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-weight: 700;
    color: var(--ink-3);
    margin-bottom: 3px;
  }
  .stop.is-hotel .stop-kicker { color: var(--accent); }
  .stop.is-fuel .stop-kicker { color: var(--accent); }
  .stop.is-stop .stop-kicker { color: var(--ink-3); }

  .stop-name {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 500;
    line-height: 1.2;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .stop-name em { font-style: italic; }

  .stop-note {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    line-height: 1.45;
    color: var(--ink-2);
    margin-top: 4px;
  }
  .stop-note b { color: var(--ink); font-weight: 600; }

  .stop-coord {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-3);
    margin-top: 5px;
    letter-spacing: -0.01em;
  }

  .stop-go-stack {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .stop-go {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 48px;
    height: 42px;
    border: 1px solid var(--ink);
    background: var(--paper);
    color: var(--ink);
    text-decoration: none;
    transition: background 0.15s ease, color 0.15s ease;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.05em;
    line-height: 1;
  }
  .stop-go span {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 300;
    margin-top: 2px;
    line-height: 0.8;
  }
  .stop-go:active {
    background: var(--ink);
    color: var(--accent);
  }
  .stop-go-apple {
    border-color: var(--ink-3);
    color: var(--ink-3);
  }
  .stop-go-apple:active {
    background: var(--ink-3);
    color: var(--paper);
  }
  .stop.is-hotel .stop-go:not(.stop-go-apple),
  .stop.is-fuel .stop-go:not(.stop-go-apple) {
    border-color: var(--accent);
    color: var(--accent);
  }
  .stop.is-hotel .stop-go:not(.stop-go-apple):active,
  .stop.is-fuel .stop-go:not(.stop-go-apple):active {
    background: var(--accent);
    color: var(--paper);
  }

  /* Hotel info card */
  .hotel-card {
    margin: 24px 0;
    padding: 18px 18px 16px;
    background: var(--paper-2);
    border: 1px solid var(--rule);
    position: relative;
  }
  .hotel-card::before {
    content: "TONIGHT";
    position: absolute;
    top: -8px;
    left: 16px;
    background: var(--paper);
    padding: 0 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--accent);
    font-weight: 700;
  }
  .hotel-card .hname {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.01em;
    line-height: 1.1;
  }
  .hotel-card .href {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-3);
    margin-top: 4px;
    word-break: break-all;
  }
  .hotel-card .hactions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  .hotel-card .hactions a {
    flex: 1;
    padding: 10px 8px;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    text-decoration: none;
    border: 1px solid var(--ink);
    background: var(--paper);
    color: var(--ink);
    font-weight: 600;
  }
  .hotel-card .hactions a:active { background: var(--ink); color: var(--paper); }
  .hotel-card .hactions a.primary {
    background: var(--accent);
    color: var(--paper);
    border-color: var(--accent);
  }
  .hotel-card .hactions a.primary:active {
    background: var(--accent-deep);
  }
  .hotel-card .hactions a.primary.apple {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
  }
  .hotel-card .hactions a.primary.apple:active {
    background: var(--accent);
    color: var(--paper);
  }

  /* Watch-this section */
  .watch {
    margin: 24px 0 0;
    padding: 14px 16px;
    background: transparent;
    border: 1px dashed var(--accent);
    color: var(--ink-2);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    line-height: 1.5;
  }
  .watch h4 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 8px;
  }
  .watch ul { list-style: none; }
  .watch li {
    padding: 4px 0 4px 16px;
    position: relative;
  }
  .watch li::before {
    content: "→";
    position: absolute;
    left: 0;
    color: var(--accent);
    font-family: 'Fraunces', serif;
  }
  .watch li b { color: var(--ink); font-weight: 600; }

  /* Footer per page */
  .day-footer {
    margin-top: 32px;
    padding-top: 16px;
    border-top: 2px solid var(--ink);
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--ink-3);
  }
  .day-footer .folio { color: var(--accent); font-weight: 700; }

  /* Tools bar (bottom) */
  .toolbar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 30;
    background: var(--paper);
    border-top: 2px solid var(--ink);
    padding: 10px 16px;
    padding-bottom: calc(10px + env(safe-area-inset-bottom));
    display: flex;
    gap: 6px;
  }
  .toolbar button {
    flex: 1;
    padding: 9px 4px;
    background: var(--paper);
    color: var(--ink);
    border: 1px solid var(--ink);
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 600;
  }
  .toolbar button:active { background: var(--ink); color: var(--paper); }

  /* Modal */
  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(26,22,18,0.55);
    align-items: flex-end;
    justify-content: center;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--paper);
    width: 100%;
    max-width: 520px;
    max-height: 80vh;
    overflow-y: auto;
    border-top: 2px solid var(--ink);
    padding: 24px 24px;
    padding-bottom: calc(24px + env(safe-area-inset-bottom));
  }
  .modal h3 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 22px;
    letter-spacing: -0.01em;
    margin-bottom: 4px;
  }
  .modal h3 em { color: var(--accent); font-style: italic; }
  .modal .modal-sub {

/* ───────────────────────────────────────────────────────────────────
   GOOGLE MAPS URL BUILDERS
   ─────────────────────────────────────────────────────────────────── */

// Single destination — opens directions to one stop, current location as origin.
function singleNavUrl(lat, lon) {
  return `https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}&travelmode=driving`;
}

// Multi-stop route. Uses the long-form /maps/dir/ URL which Google Maps app
// accepts up to ~10 stops in practice. First point = origin, last = destination,
// middle ones = waypoints in order.
function multiRouteUrl(stops) {
  if (!stops || stops.length < 2) return "#";
  const parts = stops.map(s => `${s.lat},${s.lon}`);
  return `https://www.google.com/maps/dir/${parts.join("/")}`;
}

/* ───────────────────────────────────────────────────────────────────
   APPLE MAPS URL BUILDERS
   Apple Maps universal links: https://maps.apple.com/?...
   Better offline behaviour than Google Maps for cached regions.
   ─────────────────────────────────────────────────────────────────── */

// Single destination via Apple Maps. dirflg=d is driving directions.
function singleNavUrlApple(lat, lon) {
  return `https://maps.apple.com/?daddr=${lat},${lon}&dirflg=d`;
}

// Multi-stop via Apple Maps. Apple Maps daddr supports +to: between stops.
// First stop = origin (saddr), rest joined with +to:
function multiRouteUrlApple(stops) {
  if (!stops || stops.length < 2) return "#";
  const saddr = `${stops[0].lat},${stops[0].lon}`;
  const rest = stops.slice(1).map(s => `${s.lat},${s.lon}`).join("+to:");
  return `https://maps.apple.com/?saddr=${saddr}&daddr=${rest}&dirflg=d`;
}

/* ───────────────────────────────────────────────────────────────────
   RENDER
   ─────────────────────────────────────────────────────────────────── */

const TODAY = new Date(); // device date
const TRIP_DATES = [
  new Date(2026, 4, 24), // Day 1
  new Date(2026, 4, 25),
  new Date(2026, 4, 26),
  new Date(2026, 4, 27),
  new Date(2026, 4, 28),
  new Date(2026, 4, 29),
  new Date(2026, 4, 30),
];

function findTodayIndex() {
  const t = new Date(TODAY.getFullYear(), TODAY.getMonth(), TODAY.getDate()).getTime();
  for (let i = 0; i < TRIP_DATES.length; i++) {
    const d = TRIP_DATES[i].getTime();
    if (t === d) return i;
  }
  return -1;
}

function renderTabs() {
  const todayIdx = findTodayIndex();
  const html = DAYS.map((d, i) => `
    <button class="tab ${i === 0 ? 'active' : ''} ${i === todayIdx ? 'today' : ''}" data-day="${i}" onclick="selectDay(${i})">
      <span class="num">Day ${d.n}</span>
      <span class="date">${d.dateLabel}</span>
    </button>
  `).join("");
  document.getElementById("tabs").innerHTML = html;
}

function fmtCoord(lat, lon) {
  return `${lat.toFixed(4)}°N · ${Math.abs(lon).toFixed(4)}°W`;
}

function renderDays() {
  const LETTERS = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  const html = DAYS.map((d, i) => {
    // Build a coord-keyed map of routeStop letter labels.
    // Coordinates rounded to 4dp (~10m) for matching.
    const routeLetters = {};
    if (d.routeStops) {
      d.routeStops.forEach((rs, rIdx) => {
        const key = rs.lat.toFixed(4) + "," + rs.lon.toFixed(4);
        routeLetters[key] = LETTERS[rIdx] || "";
      });
    }

    const stopsHtml = d.stops.map((s, idx) => {
      const key = s.lat.toFixed(4) + "," + s.lon.toFixed(4);
      const letter = routeLetters[key];
      const numLabel = letter
        ? `<span class="stop-letter">${letter}</span>`
        : `<span class="stop-num-only">${String(idx + 1).padStart(2, '0')}</span>`;
      return `
      <div class="stop is-${s.kind}">
        <div class="stop-no">${numLabel}</div>
        <div class="stop-body">
          <div class="stop-kicker">${s.kicker}</div>
          <div class="stop-name">${s.name}</div>
          <div class="stop-note">${s.note}</div>
          <div class="stop-coord">${fmtCoord(s.lat, s.lon)}</div>
        </div>
        <div class="stop-go-stack">
          <a class="stop-go" href="${singleNavUrl(s.lat, s.lon)}" target="_blank" rel="noopener" aria-label="Navigate to ${s.name} in Google Maps">G<span>→</span></a>
          <a class="stop-go stop-go-apple" href="${singleNavUrlApple(s.lat, s.lon)}" target="_blank" rel="noopener" aria-label="Navigate to ${s.name} in Apple Maps">A<span>→</span></a>
        </div>
      </div>
    `;
    }).join("");

    const routeBtn = d.routeStops && d.routeStops.length >= 2 ? `
      <a class="route-go" href="${multiRouteUrl(d.routeStops)}" target="_blank" rel="noopener">
        <span class="label">Today's full route · Google Maps</span>
        <span class="text">
          <span class="heading">${d.title}${d.arrow ? '<span class="day-arrow">⟶</span>' : ''}${d.subtitle && d.arrow ? d.subtitle : ''}</span>
          <span class="arrow">→</span>
        </span>
      </a>
      <a class="route-apple" href="${multiRouteUrlApple(d.routeStops)}" target="_blank" rel="noopener">
        <span class="apple-label">Same route · Apple Maps <em>(better offline)</em></span>
        <span class="apple-arrow">→</span>
      </a>
    ` : '';

    function altBtn(alt) {
      if (!alt || !alt.stops || alt.stops.length < 2) return '';
      return `
        <a class="route-alt" href="${multiRouteUrl(alt.stops)}" target="_blank" rel="noopener">
          <span class="alt-label">${alt.label}</span>
          <span class="alt-sub">${alt.sublabel || ''}</span>
          <span class="alt-arrow">→</span>
        </a>
        <a class="route-alt-apple" href="${multiRouteUrlApple(alt.stops)}" target="_blank" rel="noopener">
          <span class="alt-apple-label">↳ Same in Apple Maps</span>
        </a>
      `;
    }
    const altBtns = altBtn(d.altRoute) + altBtn(d.altRoute2);

    const watchHtml = (d.watch || []).map(w => `
      <div class="watch">
        <h4>${w.title}</h4>
        <ul>${w.items.map(it => `<li>${it}</li>`).join("")}</ul>
      </div>
    `).join("");

    const hotelHtml = d.hotel ? `
      <div class="hotel-card">
        <div class="hname">${d.hotel.name}</div>
        <div class="href">${d.hotel.ref} · ${d.hotel.tel}</div>
        <div class="hactions">
          <a href="tel:${d.hotel.tel.replace(/\s/g, '')}">Call</a>
          <a class="primary" href="${singleNavUrl(d.hotel.lat, d.hotel.lon)}" target="_blank" rel="noopener">Google</a>
          <a class="primary apple" href="${singleNavUrlApple(d.hotel.lat, d.hotel.lon)}" target="_blank" rel="noopener">Apple</a>
        </div>
      </div>
    ` : '';

    return `
      <section class="day-panel ${i === 0 ? 'active' : ''}" data-day="${i}">
        <div class="day-folio">Day ${d.n} of 7 · ${d.dateLong}</div>
        <h2 class="day-title">
          ${d.title}${d.arrow ? '<span class="day-arrow">⟶</span>' : ''}<em>${d.arrow ? d.subtitle : ''}</em>
        </h2>
        <div class="day-meta"><b>${d.miles}</b> · ${d.note}</div>
        ${routeBtn}
        ${altBtns}
        ${hotelHtml}
        <div class="stops-h"><span>The Stops</span><span class="count">${d.stops.length} total</span></div>
        ${stopsHtml}
        ${watchHtml}
        <div class="roadmark">· · · · · · · · · ·</div>
        <div class="day-footer">
          <span class="folio">Day ${d.n} / 7</span>
          <span>NC500 · Surtees · MMXXVI</span>
        </div>
      </section>
    `;
  }).join("");
  document.getElementById("content").innerHTML = html;
}

function selectDay(i) {
  document.querySelectorAll(".tab").forEach((el, idx) => {
    el.classList.toggle("active", idx === i);
  });
  document.querySelectorAll(".day-panel").forEach((el, idx) => {
    el.classList.toggle("active", idx === i);
  });
  // Scroll selected tab into view, content to top
  const tab = document.querySelector(`.tab[data-day="${i}"]`);
  if (tab) tab.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
  window.scrollTo({ top: 0, behavior: "smooth" });
}

/* ───── Modal ───── */

function openModal(kind) {
  const m = document.getElementById("modal");
  const c = document.getElementById("modalContent");
  let html = "";

  if (kind === "hotels") {
    html = `<h3><em>Six</em> Hotels</h3><div class="modal-sub">Booking & Phone</div>`;
    HOTELS.forEach(h => {
      html += `
        <div class="row">
          <div>
            <div class="who">${h.name}</div>
            <div class="what">Day ${h.day} · ${h.town} · ${h.ref}</div>
          </div>
          <a href="tel:${h.tel.replace(/\s/g, '')}">${h.tel}</a>
        </div>
      `;
    });
  } else if (kind === "contacts") {
    html = `<h3>Phones</h3><div class="modal-sub">Tap to call</div>`;
    CONTACTS.forEach(c => {
      html += `
        <div class="row">
          <div>
            <div class="who">${c.who}</div>
            <div class="what">${c.what}</div>
          </div>
          <a href="tel:${c.tel.replace(/\s/g, '')}">${c.tel}</a>
        </div>
      `;
    });
  } else if (kind === "fuel") {
    html = `<h3>Fuel <em>Plan</em></h3><div class="modal-sub">Porsche 992 GTS · Super E5 97 RON</div>`;
    FUEL.forEach(f => {
      html += `
        <div class="row">
          <div>
            <div class="who">${f.day}</div>
            <div class="what"><b>${f.what}</b><br>${f.note}</div>
          </div>
        </div>
      `;
    });
  } else if (kind === "refs") {
    html = `<h3>Booking <em>Refs</em></h3><div class="modal-sub">Confirmation numbers</div>`;
    REFS.forEach(r => {
      html += `
        <div class="row">
          <div>
            <div class="who">${r.who}</div>
            <div class="what">${r.what}</div>
          </div>
          <span class="what" style="font-weight:700;color:var(--ink);font-size:11px;letter-spacing:-0.02em;">${r.tel}</span>
        </div>
      `;
    });
  }

  html += `<button class="modal-close" onclick="closeModal()">Close</button>`;
  c.innerHTML = html;
  m.classList.add("open");
}

function closeModal() {
  document.getElementById("modal").classList.remove("open");
}
